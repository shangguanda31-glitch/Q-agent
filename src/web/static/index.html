<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QQ 智慧助理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d1a;--bg2:#151528;--bg3:#1e1e3a;--border:#2a2a4a;--accent:#7c7cff;--green:#00cc88;--red:#ff3355;--orange:#ff9900;--text:#e0e0e0;--text2:#888;--text3:#555;--radius:10px;--radius-sm:6px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:14px}
.app{display:flex;height:100vh}
.sidebar{width:360px;min-width:360px;background:var(--bg2);display:flex;flex-direction:column;border-right:1px solid var(--border)}
.sidebar-top{padding:16px 20px;border-bottom:1px solid var(--border)}
.sidebar-top h1{font-size:17px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-top .sub{font-size:11px;color:var(--text3);margin-top:2px}
.conn-status{display:flex;align-items:center;gap:6px;padding:8px 20px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot-err{background:var(--red);box-shadow:0 0 6px var(--red)}
.nav-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2)}
.nav-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:12px;font-weight:500;color:var(--text3);transition:all .2s;border-bottom:2px solid transparent}
.nav-tab:hover{color:var(--text2);background:var(--bg3)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(124,124,255,.08)}
.list-scroll{flex:1;overflow-y:auto;padding:6px}
.list-scroll::-webkit-scrollbar{width:4px}
.list-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.stats-bar{display:flex;gap:12px;padding:8px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
.main{flex:1;display:flex;flex-direction:column;background:var(--bg)}

/* Conversation list */
.conv{padding:10px 14px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:2px;border-left:3px solid transparent;transition:all .1s}
.conv:hover{background:var(--bg3)}
.conv.active{background:var(--bg3);border-left-color:var(--accent)}
.conv .hdr{display:flex;justify-content:space-between;align-items:center}
.conv .name{font-weight:600;font-size:13px;color:#ccc}
.conv .time{font-size:11px;color:var(--text3)}
.conv .preview{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.conv .badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-top:3px}
.badge-group{background:rgba(124,124,255,.2);color:var(--accent)}
.badge-private{background:rgba(0,204,136,.15);color:var(--green)}

/* Chat messages */
.chat-header{padding:16px 24px;border-bottom:1px solid var(--border)}
.chat-header .name{font-size:16px;font-weight:600}
.chat-header .meta{font-size:12px;color:var(--text2);margin-top:3px}
.chat-body{flex:1;padding:16px 24px;overflow-y:auto}
.chat-body::-webkit-scrollbar{width:4px}
.chat-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{max-width:85%;margin-bottom:12px;animation:fadeIn .2s}
.msg .sender{font-size:12px;color:var(--accent);margin-bottom:2px;font-weight:500}
.msg .bubble{padding:10px 14px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);font-size:13px;line-height:1.6;white-space:pre-wrap;color:#d0d0d0}
.msg .bubble .tag{font-size:10px;margin-left:4px}
.msg .time{font-size:10px;color:var(--text3);margin-top:3px;padding-left:2px}
.msg.in .bubble{border-left:2px solid var(--accent)}
.msg.out .bubble{border-left:2px solid var(--green);background:rgba(0,204,136,.05)}

.placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:15px;flex-direction:column;gap:8px}
.placeholder .icon{font-size:40px;opacity:.3}
.img-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.img-grid img{max-width:200px;max-height:160px;border-radius:8px;cursor:pointer;border:1px solid var(--border);object-fit:cover}
.img-grid img:hover{border-color:var(--accent)}
.img-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:999;cursor:pointer}
.img-overlay img{max-width:92%;max-height:92%;border-radius:6px}
.empty-state{padding:60px 20px;text-align:center;color:var(--text3);font-size:13px}

/* Shared styles for other tabs */
.item-list{padding:0}
.list-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:4px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:border-color .2s}
.list-item:hover{border-color:var(--accent)}
.list-item .li-body{flex:1;min-width:0}
.list-item .li-title{font-weight:600;font-size:13px}
.list-item .li-meta{font-size:11px;color:var(--text2);margin-top:2px}
.schedule-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:4px;background:var(--bg2);border:1px solid var(--border);animation:fadeIn .25s ease}
.s-btn{padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:11px}
.s-btn:hover{background:var(--bg3)}
.s-btn.done{color:var(--green)}.s-btn.del{color:var(--red)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-top">
      <h1>◆ QQ 智慧助理</h1>
      <div class="sub">按会话分组</div>
    </div>
    <div class="conn-status"><span class="dot dot-err" id="statusDot"></span><span id="statusText">等待连接...</span></div>
    <div class="nav-tabs">
      <div class="nav-tab active" data-tab="messages" onclick="switchTab('messages')">💬 会话</div>
      <div class="nav-tab" data-tab="schedules" onclick="switchTab('schedules')">📅 日程</div>
      <div class="nav-tab" data-tab="notes" onclick="switchTab('notes')">📝 笔记</div>
      <div class="nav-tab" data-tab="memories" onclick="switchTab('memories')">🧠 记忆</div>
      <div class="nav-tab" data-tab="workspace" onclick="switchTab('workspace')">📁 文件</div>
    </div>
    <div class="list-scroll" id="listContent"></div>
    <div class="stats-bar"><span>📊 <b id="statTotal">0</b></span><span>💬 <b id="statConv">0</b></span><span>📅 <b id="statSched">0</b></span><span>📝 <b id="statNotes">0</b></span></div>
  </div>
  <div class="main" id="mainArea"><div class="placeholder"><div class="icon">◈</div><div>选择一个会话查看消息</div></div></div>
</div>
<script>
const messages=[]; let tab='messages', selectedConv=null;
const $=id=>document.getElementById(id);
const statusDot=$('statusDot'), statusText=$('statusText'), listContent=$('listContent'), mainArea=$('mainArea');
const evtSource=new EventSource('/events');
evtSource.onopen=()=>{statusDot.className='dot dot-ok';statusText.textContent='已连接'};
evtSource.onerror=()=>{statusDot.className='dot dot-err';statusText.textContent='断连'};
evtSource.onmessage=e=>{try{const m=JSON.parse(e.data);m.chatId=m.group_id?'group_'+m.group_id:'private_'+m.user_id;m._id=messages.length;messages.push(m);updateStats();if(tab==='messages')renderConvs()}catch(e){}};

async function loadHistory(){try{const r=await fetch('/api/history');const h=await r.json();h.forEach(m=>{m.chatId=m.group_id?'group_'+m.group_id:'private_'+m.user_id;m._id=messages.length;messages.push(m)});updateStats();if(tab==='messages')renderConvs()}catch(e){}}
loadHistory();

function getChats(){const map={};messages.forEach(m=>{const cid=m.chatId;if(!map[cid]||m._id>map[cid]._id)map[cid]=m});return Object.entries(map).sort((a,b)=>b[1]._id-a[1]._id)}

function renderConvs(){const chats=getChats();if(!chats.length){listContent.innerHTML='<div class="empty-state">暂无消息</div>';return}
listContent.innerHTML=chats.map(([cid,last])=>{
  const isGroup=last.group_id?true:false;
  const label=isGroup?`群 ${last.group_id}`:`${last.sender_name||last.user_id}`;
  const act=cid===selectedConv?'active':'';
  return `<div class="conv ${act}" onclick="selectConv('${cid}')"><div class="hdr"><span class="name">${esc(label)}</span><span class="time">${(last.time||'').split(' ')[1]||''}</span></div><div class="preview">${esc(last.raw_text?.substring(0,50))}</div><span class="badge ${isGroup?'badge-group':'badge-private'}">${isGroup?'群聊':'私聊'}</span></div>`
}).join('')}

function selectConv(cid){selectedConv=cid;renderConvs();const chatMsgs=messages.filter(m=>m.chatId===cid);if(!chatMsgs.length)return
const last=chatMsgs[chatMsgs.length-1];const label=last.group_id?`群 ${last.group_id}`:`与 ${last.sender_name||last.user_id} 的私聊`
let html='<div class="chat-header"><div class="name">'+esc(label)+'</div><div class="meta">'+chatMsgs.length+' 条消息</div></div><div class="chat-body">'
chatMsgs.forEach(m=>{
  const imgs=m.image_urls?.length?`<div class="img-grid">${m.image_urls.map(u=>`<img src="${u}" onclick="previewImg(this.src)" loading="lazy">`).join('')}</div>`:''
  const tag=m.analysis?.priority?`<span class="tag tag-${m.analysis.priority}" style="font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px">${m.analysis.priority}</span>`:''
  html+=`<div class="msg in"><div class="sender">${esc(m.sender_name)} ${tag}</div><div class="bubble">${esc(m.raw_text)}${imgs}</div><div class="time">${m.time}</div></div>`
})
html+='</div>';mainArea.innerHTML=html;setTimeout(()=>{const b=mainArea.querySelector('.chat-body');if(b)b.scrollTop=b.scrollHeight},100)}

function switchTab(t){tab=t;document.querySelectorAll('.nav-tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t))
mainArea.innerHTML='<div class="placeholder"><div class="icon">◈</div><div>选择项目查看详情</div></div>'
if(t==='messages')renderConvs();else if(t==='schedules')renderSchedules();else if(t==='notes')renderNotes();else if(t==='memories')renderMemories();else if(t==='workspace')renderWorkspace()}

async function updateStats(){try{const s=await(await fetch('/api/schedules')).json();$('statSched').textContent=s.length}catch(e){}try{const n=await(await fetch('/api/notes')).json();$('statNotes').textContent=n.length}catch(e){}$('statTotal').textContent=messages.length;$('statConv').textContent=getChats().length}

async function renderSchedules(){let r=[];try{r=await(await fetch('/api/schedules')).json()}catch(e){}
if(!r.length){listContent.innerHTML='<div class="empty-state">📅 暂无日程</div>';return}
const p=r.filter(s=>s.status!=='done'),d=r.filter(s=>s.status==='done');let h=''
if(p.length)h+='<div style="padding:8px 12px;font-size:11px;color:var(--text3)">⏳ 待处理</div>'+p.map(s=>'<div class="schedule-item"><div style="font-size:16px">⏳</div><div style="flex:1"><div style="font-weight:600;font-size:13px">'+esc(s.title)+'</div><div style="font-size:11px;color:var(--text2)">'+esc(s.time||'时间待定')+'</div></div><button class="s-btn done" onclick="sched(\'done\',\''+s.id+'\')">✅</button><button class="s-btn del" onclick="sched(\'del\',\''+s.id+'\')">✕</button></div>').join('')
if(d.length)h+='<div style="padding:8px 12px;font-size:11px;color:var(--text3);margin-top:8px">✅ 已完成</div>'+d.map(s=>'<div class="schedule-item"><div style="font-size:16px">✅</div><div style="flex:1"><div style="font-weight:600;font-size:13px">'+esc(s.title)+'</div><div style="font-size:11px;color:var(--text2)">'+esc(s.time||'')+'</div></div><button class="s-btn del" onclick="sched(\'del\',\''+s.id+'\')">✕</button></div>').join('')
listContent.innerHTML=h}
async function sched(a,i){await fetch('/api/schedules/'+a,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:i})});renderSchedules();updateStats()}

async function renderNotes(){let r=[];try{r=await(await fetch('/api/notes')).json()}catch(e){}
if(!r.length){listContent.innerHTML='<div class="empty-state">📝 暂无笔记</div>';return}
listContent.innerHTML=r.map(n=>'<div class="list-item" onclick="showNote(\''+n.id+'\')"><div class="li-body"><div class="li-title">'+esc(n.content.substring(0,80))+'</div><div class="li-meta">'+esc(n.speaker)+' · '+(n.source||'')+' · '+(n.created_at?.split('T')[1]?.substring(0,5)||'')+'</div></div></div>').join('')}
function showNote(id){fetch('/api/notes').then(r=>r.json()).then(d=>{const n=d.find(x=>x.id===id);if(!n)return;mainArea.innerHTML='<div class="chat-header"><div class="name">📝 笔记</div><div class="meta">'+esc(n.speaker)+' · '+(n.source||'')+' · '+n.created_at+'</div></div><div class="chat-body"><div style="font-size:14px;line-height:1.7;white-space:pre-wrap">'+esc(n.content)+'</div></div>'})}

async function renderMemories(){let r=[];try{r=await(await fetch('/api/memories')).json()}catch(e){}
if(!r.length){listContent.innerHTML='<div class="empty-state">🧠 暂无记忆</div>';return}
listContent.innerHTML=r.map(m=>'<div class="list-item" onclick="showMem(\''+m.id+'\')"><div class="li-body"><div class="li-title">'+esc(m.content.substring(0,100))+'</div><div class="li-meta">🏷 '+(m.tags?.join(', ')||'')+' · '+(m.created_at?.split('T')[0]||'')+'</div></div></div>').join('')}
function showMem(id){fetch('/api/memories').then(r=>r.json()).then(d=>{const m=d.find(x=>x.id===id);if(!m)return;mainArea.innerHTML='<div class="chat-header"><div class="name">🧠 记忆</div><div class="meta">'+m.created_at+' · 来源: '+m.source+'</div></div><div class="chat-body"><div style="font-size:14px;line-height:1.7;white-space:pre-wrap">'+esc(m.content)+'</div></div>'})}

async function renderWorkspace(){try{const r=await(await fetch('/api/workspace')).json();if(!r.length){listContent.innerHTML='<div class="empty-state">📁 无文件</div>';return}
listContent.innerHTML=r.map(f=>'<div class="list-item" onclick="showFile(\''+esc(f)+'\')"><div class="li-body"><div class="li-title">📄 '+esc(f)+'</div></div></div>').join('')}catch(e){}}
async function showFile(n){try{mainArea.innerHTML='<div class="chat-header"><div class="name">📁 '+esc(n)+'</div></div><div class="chat-body">'+(await(await fetch('/api/workspace/'+n)).text())+'</div>'}catch(e){}}

function previewImg(s){const o=document.createElement('div');o.className='img-overlay';o.onclick=()=>o.remove();const i=document.createElement('img');i.src=s;o.appendChild(i);document.body.appendChild(o)}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
listContent.innerHTML='<div class="empty-state">等待消息...</div>';
</script>
</body>
</html>
